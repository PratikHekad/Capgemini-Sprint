# ─── Application URLs ──────────────────────────────────────────────────────
base.url=https://practice.expandtesting.com/notes/app
api.base.url=https://practice.expandtesting.com/notes/api

# ─── Test Account Credentials ──────────────────────────────────────────────
# Register an account on the app and put those details here
test.email=pratikhekad11@gmail.com
test.password=Pratik(09)

# ─── Browser Configuration ─────────────────────────────────────────────────
browser=chrome
headless=false

# ─── Timeouts (in seconds) ─────────────────────────────────────────────────
implicit.wait=5
explicit.wait=15
page.load.timeout=30

# ─── API Configuration ─────────────────────────────────────────────────────
# Max allowed response time in milliseconds (FR-08 requirement)
api.response.time.ms=2000

# ─── Reporting ─────────────────────────────────────────────────────────────
screenshot.dir=test-output/screenshots
extent.report.dir=test-output/reports

# ─── Section 3 — Performance thresholds ────────────────────────────────────
perf.api.get.notes.ms=2000
perf.api.post.note.ms=2000
perf.api.delete.note.ms=2000
perf.ui.login.load.ms=4000
perf.ui.dashboard.load.ms=4000
perf.trend.log.file=test-output/performance/perf-trend.csv

# ─── Section 3 — Agentic retry config ─────────────────────────────────────
agentic.max.retries=3
agentic.retry.delay.ms=1500

# ─── Section 3 — MCP locator map ──────────────────────────────────────────
# Format: mcp.locator.<semantic_name>=strategy:value  (comma = fallbacks)
mcp.locator.login_email=id:email
mcp.locator.login_password=id:password
mcp.locator.login_button=css:[data-testid='login-submit']
mcp.locator.add_note_btn=css:[data-testid='add-note'],xpath://a[contains(@href,'/notes/new')]
mcp.locator.note_title_field=id:title
mcp.locator.note_category=id:category
mcp.locator.note_description=id:description
mcp.locator.save_note_btn=css:button[type='submit']
